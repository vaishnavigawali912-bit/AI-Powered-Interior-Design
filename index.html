<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <!-- SEO -->
    <title>AI Design Studio | Transform Your Space Instantly</title>
    <meta name="description" content="Upload your room image and get AI-powered modern luxury designs instantly. Fast, smart, and stunning interior transformations.">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a;
            color: #fff;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: rgba(0,0,0,0.5);
        }

        header h1 {
            color: #38bdf8;
        }

        nav a {
            margin-left: 20px;
            color: #fff;
            text-decoration: none;
        }

        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 3rem;
        }

        .hero p {
            margin-top: 10px;
            opacity: 0.8;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #38bdf8;
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .upload-section {
            padding: 50px;
            text-align: center;
        }

        .upload-box {
            border: 2px dashed #38bdf8;
            padding: 40px;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<header>
    <h1>AI Design</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Upload</a>
    </nav>
</header>

<section class="hero">
    <h2>Transform Your Room with AI</h2>
    <p>Upload your space and get stunning luxury designs instantly</p>
    <button class="btn" onclick="scrollToUpload()">Get AI Design</button>
</section>

<section class="upload-section" id="upload">
    <h2>Upload Your Room</h2>
    <div class="upload-box">
        <input type="file" id="fileInput">
        <p>Drag & drop or click to upload</p>
    </div>
</section>

<footer>
    <p>© 2026 AI Design Studio. All rights reserved.</p>
</footer>

<script>
    function scrollToUpload() {
        document.getElementById("upload").scrollIntoView({ behavior: "smooth" });
    }
</script>

</body>
</html>
